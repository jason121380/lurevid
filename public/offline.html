<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b2c" />
    <title>離線 | lurevid</title>
    <style>
      :root {
        --orange: #ff6b2c;
        --orange-dark: #e55a1c;
        --black: #1a1a1a;
        --gray-500: #666;
        --warm-white: #fafafa;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--warm-white);
        color: var(--black);
        font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 400;
        -webkit-text-size-adjust: 100%;
      }
      .card {
        width: 100%;
        max-width: 380px;
        text-align: center;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 18px 60px rgb(26 26 26 / 0.06);
      }
      .badge {
        display: inline-grid;
        place-items: center;
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: #fff5f0;
        color: var(--orange);
      }
      h1 { font-size: 1.15rem; font-weight: 400; margin: 0 0 8px; }
      p { font-size: 0.875rem; line-height: 1.6; color: var(--gray-500); margin: 0 0 20px; }
      button {
        height: 44px;
        padding: 0 22px;
        border: none;
        border-radius: 999px;
        background: var(--orange);
        color: #fff;
        font: inherit;
        font-size: 0.875rem;
        cursor: pointer;
        transition: background 160ms ease;
      }
      button:hover { background: var(--orange-dark); }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>目前無法連線</h1>
      <p>看起來你的裝置離線了。請確認網路後再試一次，已快取的頁面仍可瀏覽。</p>
      <button type="button" onclick="location.reload()">重新整理</button>
    </main>
  </body>
</html>
